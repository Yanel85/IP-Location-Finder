name: Package and Release

on:
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(grep -oP '"version"\s*:\s*"\K[^"]+' extension/manifest.json)
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package Extension
        run: |
          cd extension
          zip -r ../IP-Location-Finder-v${{ steps.version.outputs.version }}.zip . \
            -x "*.DS_Store" "*.DS_Store?"
          cd ..

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing release
        if: steps.check_release.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "v${{ steps.version.outputs.version }}" --yes

      - name: Create Release and Upload Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            "IP-Location-Finder-v${{ steps.version.outputs.version }}.zip" \
            --title "Release v${{ steps.version.outputs.version }}" \
            --notes "Release v${{ steps.version.outputs.version }} of IP Location Finder extension."
